name: Pull Request Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-pr:
    name: Validate PR
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check PR target branch
        run: |
          TARGET="${{ github.base_ref }}"
          SOURCE="${{ github.head_ref }}"
          
          echo "📋 PR: $SOURCE → $TARGET"
          
          # Validar flujo de branches
          if [[ "$TARGET" == "main" ]] && [[ "$SOURCE" != "qa" ]] && [[ "$SOURCE" != "hotfix/"* ]]; then
            echo "❌ ERROR: Solo se puede mergear a 'main' desde 'qa' o 'hotfix/*'"
            echo "Tu PR es: $SOURCE → $TARGET"
            echo "Debe ser: qa → main  |  hotfix/* → main"
            exit 1
          fi

          if [[ "$TARGET" == "qa" ]] && [[ "$SOURCE" != "dev" ]] && [[ "$SOURCE" != "hotfix/"* ]] && [[ "$SOURCE" != "main" ]]; then
            echo "❌ ERROR: Solo se puede mergear a 'qa' desde 'dev', 'hotfix/*' o 'main'"
            echo "Tu PR es: $SOURCE → $TARGET"
            echo "Debe ser: dev → qa  |  hotfix/* → qa  |  main → qa"
            exit 1
          fi

          if [[ "$TARGET" == "dev" ]] && [[ "$SOURCE" != "feature/"* ]] && [[ "$SOURCE" != "hotfix/"* ]] && [[ "$SOURCE" != "main" ]]; then
            echo "❌ ERROR: Solo se puede mergear a 'dev' desde 'feature/*', 'hotfix/*' o 'main'"
            echo "Tu PR es: $SOURCE → $TARGET"
            echo "Debe ser: feature/* → dev  |  hotfix/* → dev  |  main → dev"
            exit 1
          fi

          echo "✅ Flujo de branches correcto"
      
      - name: Check PR title format
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          if [[ ! "$PR_TITLE" =~ ^(feat|fix|docs|style|refactor|test|chore|hotfix)(\(.+\))?:\ .+ ]]; then
            echo "⚠️ Recomendación: Usa conventional commits"
            echo "Ejemplo: feat(button): agregar variante outline"
          fi

  build-and-test:
    name: Build & Test PR
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Lint
        run: pnpm --filter @bip/ui-components lint

      - name: Test
        run: |
          pnpm --filter @bip/shared-utils test
          pnpm --filter @bip/ui-components test

      - name: Build
        run: |
          pnpm --filter @bip/shared-utils build
          pnpm --filter @bip/ui-components build
      
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Build exitoso! Los cambios están listos para review.'
            })