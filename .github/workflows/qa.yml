name: QA Environment

on:
  push:
    branches: [qa]
  pull_request:
    branches: [qa]

jobs:
  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run security audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm --filter @bip/ui-components lint

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [lint]
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run tests
        run: |
          pnpm --filter @bip/shared-utils test
          pnpm --filter @bip/ui-components test

      - name: Build all packages
        run: |
          pnpm --filter @bip/shared-utils build
          pnpm --filter @bip/ui-components build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qa-build
          path: packages/*/dist
          retention-days: 7

  deploy-storybook-qa:
    name: Deploy Storybook QA
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build Storybook
        run: pnpm --filter @bip/ui-components build-storybook
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
      
      - name: Add QA badge to Storybook
        run: |
          echo '<div style="background:orange;color:white;padding:10px;text-align:center;font-weight:bold;">⚠️ AMBIENTE QA - NO USAR EN PRODUCCIÓN</div>' > ./packages/ui-components/storybook-static/qa-banner.html
      
      - name: Upload to staging
        run: echo "📦 Deploy a ambiente de staging/QA"
        # Aquí desplegarías a un subdomain de QA

  notify-qa-team:
    name: Notify QA Team
    runs-on: ubuntu-latest
    needs: [deploy-storybook-qa]
    if: github.event_name == 'push'
    
    steps:
      - name: Send notification
        run: |
          echo "🔔 Nueva build disponible en QA"
          echo "Branch: qa"
          echo "Commit: ${{ github.sha }}"
          # Aquí integrarías con Slack/Discord/Email
          # curl -X POST ${{ secrets.SLACK_WEBHOOK }} -d '{"text":"Nueva build en QA lista para testing"}'