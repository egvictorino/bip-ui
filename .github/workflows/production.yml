name: Production Deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Permite deploy manual

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "production"
  cancel-in-progress: false

jobs:
  validate:
    name: Pre-Production Validation
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Security audit
        run: pnpm audit --audit-level=high
      
      - name: Lint (strict)
        run: pnpm --filter @bip/ui-components lint
      
      - name: Test
        run: |
          pnpm --filter @bip/shared-utils test
          pnpm --filter @bip/ui-components test

      - name: Type check & build (validate)
        run: |
          pnpm --filter @bip/shared-utils build
          pnpm --filter @bip/ui-components build

  build-production:
    name: Build Production
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-prod-${{ hashFiles('**/pnpm-lock.yaml') }}
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build packages (production mode)
        run: |
          NODE_ENV=production pnpm --filter @bip/shared-utils build
          NODE_ENV=production pnpm --filter @bip/ui-components build

      - name: Upload production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: packages/*/dist
          retention-days: 30

  deploy-storybook-production:
    name: Deploy Storybook to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-production
    if: github.event_name != 'pull_request'
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build Storybook
        run: pnpm --filter @bip/ui-components build-storybook
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./packages/ui-components/storybook-static
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  create-release:
    name: Create Release Tag
    runs-on: ubuntu-latest
    needs: [deploy-storybook-production]
    if: github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get version
        id: version
        run: |
          VERSION=$(date +%Y.%m.%d)-${{ github.run_number }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Release v${{ steps.version.outputs.version }}
          body: |
            ## 🚀 Cambios en Producción
            
            **Commit:** ${{ github.sha }}
            **Autor:** ${{ github.actor }}
            
            ### Documentación
            - [Storybook](https://tu-usuario.github.io/bip-ui/)
          draft: false
          prerelease: false

  notify-production:
    name: Notify Production Deploy
    runs-on: ubuntu-latest
    needs: [create-release]
    
    steps:
      - name: Success notification
        run: |
          echo "✅ Deploy a PRODUCCIÓN completado exitosamente"
          echo "🔗 Storybook: https://tu-usuario.github.io/bip-ui/"
          # Integración con Slack/Discord/Email